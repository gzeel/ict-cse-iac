name: CI/CD — Multi-Stage Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '.github/workflows/staged-pipeline.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '.github/workflows/staged-pipeline.yml'

jobs:
  lint:
    name: Stage 1 — Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run yamllint
        run: |
          pip install yamllint
          yamllint ansible/

  syntax:
    name: Stage 2 — Syntax Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ansible syntax check
        run: |
          pip install ansible
          ansible-playbook --syntax-check ansible/install-apache.yml

      - name: Run ansible-lint
        run: |
          pip install ansible-lint
          ansible-lint ansible/install-apache.yml

  dry-run:
    name: Stage 3 — Dry-Run (--check)
    runs-on: ubuntu-latest
    needs: syntax
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ansible dry-run
        run: |
          pip install ansible
          ansible-playbook --check --diff ansible/install-apache.yml

  apply:
    name: Stage 4 — Apply (alleen op push naar main)
    runs-on: ubuntu-latest
    needs: dry-run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Voer playbook uit
        run: |
          pip install ansible
          ansible-playbook --connection=local ansible/install-apache.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'false'
